  <noscript>
    <h1>DinarExchange — Taux de change du Dinar algérien</h1>
    <p>DinarExchange est une application web progressive (PWA) qui affiche les taux de change officiels et parallèles du
      Dinar algérien (DZD) en temps réel. Elle couvre le taux officiel bancaire (données de la Banque Centrale
      Européenne via l'API Frankfurter) et le taux du marché parallèle estimé à partir du Square Port-Saïd d'Alger.</p>
    <p>Devises suivies : USD, EUR, GBP, CHF, CAD, AED, SAR, CNY, TRY, TND, MAD, JPY.</p>
    <p>Fonctionnalités : convertisseur de devises, graphiques historiques (7, 30, 90 jours), favoris, mode hors-ligne,
      installation sur l'écran d'accueil.</p>
    <p>Cette application nécessite JavaScript pour fonctionner. Veuillez activer JavaScript dans votre navigateur.</p>
  </noscript>
